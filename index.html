<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Care Taker Travels</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #f4f6f9;
}

/* HEADER */
header {
  position: absolute;
  width: 100%;
  color: white;
  text-align: center;
  z-index: 10;
}

/* HERO */
.hero {
  height: 100vh;
  background: url('https://images.unsplash.com/photo-1501785888041-af3ef285b470') no-repeat center;
  background-size: cover;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: white;
  text-align: center;
}

.hero h1 {
  font-size: 50px;
  margin: 0;
}

.hero p {
  font-size: 20px;
  margin: 10px 0 20px;
}

/* BUTTON */
.btn {
  background: #ff7f50;
  padding: 12px 25px;
  border: none;
  border-radius: 30px;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

/* SECTION */
.section {
  padding: 50px;
  text-align: center;
}

/* PACKAGES */
.packages {
  display: flex;
  justify-content: center;
  gap: 30px;
  flex-wrap: wrap;
}

.card {
  width: 300px;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  background: white;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.card-content {
  padding: 15px;
}

/* AIR BOOKING */
.booking {
  background: linear-gradient(135deg, #3c6382, #0a3d62);
  color: white;
  padding: 40px;
  border-radius: 20px;
  margin: 40px;
}

.booking input {
  padding: 10px;
  margin: 10px;
  border-radius: 8px;
  border: none;
}

.booking button {
  background: #25D366;
  padding: 10px 20px;
  border: none;
  border-radius: 20px;
  color: white;
  cursor: pointer;
}

/* WHATSAPP */
.whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25D366;
  color: white;
  padding: 15px;
  border-radius: 50px;
  text-decoration: none;
}

footer {
  background: #0a3d62;
  color: white;
  text-align: center;
  padding: 15px;
}
</style>

</head>

<body>

<header>
  <h2>The Care Taker</h2>
</header>

<!-- HERO -->
<div class="hero">
  <h1>Explore The World in Luxury</h1>
  <p>CARE CAPTURED IN EVERY MILE</p>
  <button class="btn" onclick="window.open('https://wa.me/919217532975')">
    Plan Your Trip
  </button>
</div>

<!-- PACKAGES -->
<div class="section">
  <h2>Premium Packages</h2>

  <div class="packages">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e">
      <div class="card-content">
        <h3>Bali Luxury</h3>
        <p>Private Villa • Honeymoon Special</p>
        <button class="btn" onclick="window.open('https://wa.me/919217532975?text=Bali Package')">Book</button>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1512343879784-a960bf40e7f2">
      <div class="card-content">
        <h3>Goa Escape</h3>
        <p>Beach Stay • Cruise Dinner</p>
        <button class="btn" onclick="window.open('https://wa.me/919217532975?text=Goa Package')">Book</button>
      </div>
    </div>

  </div>
</div>

<!-- AIR TICKET BOOKING -->
<div class="booking">
  <h2>Book Air Tickets ✈️</h2>
  <input type="text" placeholder="From">
  <input type="text" placeholder="To">
  <input type="date">
  <br>
  <button onclick="window.open('https://wa.me/919217532975?text=I want to book flight ticket')">
    Book Now
  </button>
</div>

<footer>
  <p>📞 9217532975 | The Care Taker Travels</p>
</footer>

<a class="whatsapp" href="https://wa.me/919217532975" target="_blank">
  💬 Chat
</a>

</body>
</html>
