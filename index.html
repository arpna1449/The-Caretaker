<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Care Taker Travels</title>

<style>
body { margin:0; font-family: 'Segoe UI'; }

/* NAV */
nav {
  display:flex; justify-content:space-between;
  padding:15px 40px;
  background:#0a3d62;
  color:white;
  position:fixed;
  width:100%;
}
nav a { color:white; margin:0 10px; text-decoration:none; }

/* HERO */
.hero {
  height:100vh;
  background:url('https://images.unsplash.com/photo-1501785888041-af3ef285b470') center/cover;
  display:flex; flex-direction:column;
  justify-content:center; align-items:center;
  color:white; text-align:center;
}
.hero h1 { font-size:45px; }

/* BUTTON */
.btn {
  background:#25D366;
  padding:10px 20px;
  border:none; border-radius:25px;
  color:white; cursor:pointer;
}

/* SECTION */
.section { padding:60px 20px; text-align:center; }

/* CARDS */
.packages {
  display:flex; flex-wrap:wrap;
  justify-content:center; gap:20px;
}
.card {
  width:280px;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
}
.card img { width:100%; height:180px; object-fit:cover; }

/* FORM */
input, select {
  padding:10px;
  margin:10px;
  width:200px;
}

/* FOOTER */
footer {
  background:black;
  color:white;
  text-align:center;
  padding:15px;
}

/* WHATSAPP */
.whatsapp {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  padding:15px;
  border-radius:50%;
  color:white;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <h3>The Care Taker</h3>
  <div>
    <a href="#">Home</a>
    <a href="#packages">Packages</a>
    <a href="#booking">Booking</a>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <h1>Plan Your Dream Trip</h1>
  <p>CARE CAPTURED IN EVERY MILE</p>
  <button class="btn" onclick="scrollToSection()">Start Planning</button>
</div>

<!-- PACKAGES -->
<div class="section" id="packages">
  <h2>Packages</h2>
  <div class="packages">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e">
      <h3>Bali</h3>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1512343879784-a960bf40e7f2">
      <h3>Goa</h3>
    </div>

  </div>
</div>

<!-- BOOKING FORM -->
<div class="section" id="booking">
  <h2>Book Your Trip ✈️</h2>

  <input id="name" placeholder="Your Name">
  <input id="phone" placeholder="Phone"><br>

  <select id="destination">
    <option>Bali</option>
    <option>Goa</option>
    <option>Andaman</option>
  </select>

  <input id="date" type="date"><br>

  <button class="btn" onclick="sendWhatsApp()">Submit Booking</button>
</div>

<footer>
  <p>📞 9217532975 | The Care Taker Travels</p>
</footer>

<a class="whatsapp" href="https://wa.me/919217532975">💬</a>

<script>
function scrollToSection() {
  document.getElementById("booking").scrollIntoView({behavior:"smooth"});
}

function sendWhatsApp() {
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let destination = document.getElementById("destination").value;
  let date = document.getElementById("date").value;

  let message = `New Booking:%0AName: ${name}%0APhone: ${phone}%0ADestination: ${destination}%0ADate: ${date}`;

  window.open(`https://wa.me/919217532975?text=${message}`);
}
</script>

</body>
</html>
