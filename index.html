<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Care Taker Travels</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
}

/* NAVBAR */
nav {
  display: flex;
  justify-content: space-between;
  padding: 15px 40px;
  background: rgba(0,0,0,0.7);
  color: white;
  position: fixed;
  width: 100%;
  z-index: 100;
}

nav a {
  color: white;
  margin: 0 10px;
  text-decoration: none;
}

/* HERO */
.hero {
  height: 100vh;
  background: url('https://images.unsplash.com/photo-1501785888041-af3ef285b470') center/cover no-repeat;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  color: white;
  text-align: center;
}

.hero h1 {
  font-size: 50px;
}

.btn {
  background: #ff7f50;
  padding: 12px 25px;
  border-radius: 30px;
  color: white;
  border: none;
  cursor: pointer;
}

/* SECTION */
.section {
  padding: 60px 20px;
  text-align: center;
}

/* CARDS */
.packages {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 25px;
}

.card {
  width: 300px;
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.card-content {
  padding: 15px;
}

/* BOOKING */
.booking, .contact {
  background: #0a3d62;
  color: white;
  padding: 40px;
}

input, textarea {
  padding: 10px;
  margin: 10px;
  border-radius: 8px;
  border: none;
  width: 250px;
}

/* FOOTER */
footer {
  background: black;
  color: white;
  text-align: center;
  padding: 15px;
}

/* WHATSAPP */
.whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25D366;
  padding: 15px;
  border-radius: 50%;
  color: white;
  text-decoration: none;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
  <h3>The Care Taker</h3>
  <div>
    <a href="#">Home</a>
    <a href="#packages">Packages</a>
    <a href="#booking">Flights</a>
    <a href="#contact">Contact</a>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <h1>Explore The World With Us</h1>
  <p>CARE CAPTURED IN EVERY MILE</p>
  <button class="btn" onclick="window.open('https://wa.me/919217532975')">
    Plan Your Trip
  </button>
</div>

<!-- PACKAGES -->
<div class="section" id="packages">
  <h2>Popular Packages</h2>
  <div class="packages">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e">
      <div class="card-content">
        <h3>Bali Luxury</h3>
        <p>5N/6D • Villa • Honeymoon</p>
        <button class="btn" onclick="window.open('https://wa.me/919217532975?text=Bali Package')">Book</button>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1512343879784-a960bf40e7f2">
      <div class="card-content">
        <h3>Goa Tour</h3>
        <p>3N/4D • Beach • Cruise</p>
        <button class="btn" onclick="window.open('https://wa.me/919217532975?text=Goa Package')">Book</button>
      </div>
    </div>

  </div>
</div>

<!-- FLIGHT BOOKING -->
<div class="booking" id="booking">
  <h2>Book Air Tickets ✈️</h2>
  <input type="text" placeholder="From">
  <input type="text" placeholder="To">
  <input type="date"><br>
  <button class="btn" onclick="window.open('https://wa.me/919217532975?text=Flight Booking Request')">
    Search Flights
  </button>
</div>

<!-- CONTACT FORM -->
<div class="contact" id="contact">
  <h2>Contact Us</h2>
  <input type="text" placeholder="Your Name"><br>
  <input type="text" placeholder="Phone"><br>
  <textarea placeholder="Your Message"></textarea><br>

  <button class="btn" onclick="window.open('https://wa.me/919217532975?text=New Inquiry')">
    Send Inquiry
  </button>
</div>

<footer>
  <p>📞 9217532975 | The Care Taker Travels</p>
</footer>

<a class="whatsapp" href="https://wa.me/919217532975" target="_blank">
  💬
</a>

</body>
</html>
