<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Care Taker Travels</title>

<style>
body {
  margin:0;
  font-family: 'Poppins', sans-serif;
  background:#f5f7fb;
}

/* NAVBAR */
nav {
  display:flex;
  justify-content:space-between;
  padding:15px 40px;
  position:fixed;
  width:100%;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
  color:white;
  z-index:100;
}
nav a { color:white; margin:0 10px; text-decoration:none; }

/* HERO */
.hero {
  height:100vh;
  background:linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
  url('https://images.unsplash.com/photo-1501785888041-af3ef285b470') center/cover;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  color:white;
  text-align:center;
}
.hero h1 { font-size:55px; margin:0; }
.hero p { font-size:20px; }

.btn {
  background:linear-gradient(45deg,#ff7f50,#ff4b2b);
  padding:12px 25px;
  border:none;
  border-radius:30px;
  color:white;
  cursor:pointer;
}

/* SECTION */
.section {
  padding:70px 20px;
  text-align:center;
}

/* CARDS */
.packages {
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:25px;
}

.card {
  width:300px;
  border-radius:20px;
  overflow:hidden;
  position:relative;
  box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

.card img {
  width:100%;
  height:220px;
  object-fit:cover;
}

.card-content {
  position:absolute;
  bottom:0;
  background:linear-gradient(transparent, rgba(0,0,0,0.8));
  color:white;
  width:100%;
  padding:15px;
}

/* BOOKING */
.booking {
  background:linear-gradient(135deg,#0a3d62,#3c6382);
  color:white;
  padding:50px;
  border-radius:20px;
  width:80%;
  margin:auto;
}

input, select {
  padding:12px;
  margin:10px;
  border:none;
  border-radius:8px;
}

/* FOOTER */
footer {
  background:#0a3d62;
  color:white;
  text-align:center;
  padding:20px;
}

/* WHATSAPP */
.whatsapp {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  padding:15px;
  border-radius:50%;
  color:white;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <h3>The Care Taker</h3>
  <div>
    <a href="#">Home</a>
    <a href="#packages">Packages</a>
    <a href="#booking">Booking</a>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <h1>Luxury Travel Experiences</h1>
  <p>CARE CAPTURED IN EVERY MILE</p>
  <button class="btn" onclick="document.getElementById('booking').scrollIntoView({behavior:'smooth'})">
    Start Planning
  </button>
</div>

<!-- PACKAGES -->
<div class="section" id="packages">
  <h2>Popular Destinations</h2>

  <div class="packages">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e">
      <div class="card-content">
        <h3>Bali</h3>
        <button class="btn" onclick="window.open('https://wa.me/919217532975?text=Bali Package')">Book</button>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1512343879784-a960bf40e7f2">
